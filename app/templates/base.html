<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ meta_description }}">
    <meta name="robots" content="{{ meta_robots }}">
    <link rel="canonical" href="{{ canonical_url }}">
    {% if google_site_verification %}
    <meta name="google-site-verification" content="{{ google_site_verification }}">
    {% endif %}
    <meta property="og:site_name" content="TMG Stats">
    <meta property="og:type" content="{{ og_type }}">
    <meta property="og:title" content="{{ page_title }}">
    <meta property="og:description" content="{{ meta_description }}">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta property="og:image" content="{{ site_url }}{{ url_for('static', filename='Race/logo.png', v=asset_version) }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page_title }}">
    <meta name="twitter:description" content="{{ meta_description }}">
    <meta name="twitter:image" content="{{ site_url }}{{ url_for('static', filename='Race/logo.png', v=asset_version) }}">
    <link rel="icon" type="image/webp" href="{{ url_for('static', filename='favicon.webp', v=asset_version) }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='app-icon-192.png', v=asset_version) }}">
    <link rel="manifest" href="/static/manifest.webmanifest">
    <meta name="theme-color" content="#111827">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v=asset_version) }}"></head>
<body>
    <header class="site-header">

        <div class="container header-inner">
            <a class="brand-block" href="/">
                <img class="brand-logo" src="{{ url_for('static', filename='Race/logo.png', v=asset_version) }}" alt="Archon Studio logo" width="96" height="64" decoding="async">
    <div class="brand-meta">
        <span class="brand-title">TMG Stats</span>
        <span class="brand-version">Version {{ app_display_version }}</span>
        <span class="brand-note">Unofficial fan project</span>
    </div>
        </a>
            <nav class="nav">
                <a class="{% if active_page == 'home' %}is-active{% endif %}" href="/">Home</a>
                <a class="{% if active_page == 'leaderboard' %}is-active{% endif %}" href="/leaderboard">Ratings</a>
                <a class="{% if active_page == 'submit' %}is-active{% endif %}" href="/submit">Submit Match</a>
                <a class="{% if active_page == 'reports' %}is-active{% endif %}" href="/reports">Game Reports</a>
                <a class="{% if active_page == 'leagues' %}is-active{% endif %}" href="/leagues">Leagues</a>
                <a class="{% if active_page == 'feedback' %}is-active{% endif %}" href="/feedback">Contact Admin</a>
                <a class="{% if active_page == 'admin' %}is-active{% endif %}" href="/admin">Admin</a>
            </nav>
            {% if is_admin %}
            <div class="admin-header-box">
                <span class="admin-badge">Admin mode</span>
                <form method="post" action="/admin/logout">
                    <button class="button button-secondary button-small" type="submit">Logout</button>
                </form>
            </div>
            {% endif %}
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        (function () {
            var header = document.querySelector('.site-header');
            if (!header) {
                return;
            }

            function syncHeaderState() {
                header.classList.toggle('is-scrolled', window.scrollY > 8);
            }

            syncHeaderState();
            window.addEventListener('scroll', syncHeaderState, { passive: true });
        })();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/service-worker.js');
            });
        }
    </script>
</body>
</html>
